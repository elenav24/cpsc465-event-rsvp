name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/services/**'
      - 'frontend/**'
      - 'terraform/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy all services regardless of changed files'
        type: boolean
        default: true

env:
  AWS_REGION: us-east-1
  APP_NAME: event-rsvp

jobs:
  # ── 0. Detect which paths changed ────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.set.outputs.terraform }}
      events: ${{ steps.set.outputs.events }}
      users: ${{ steps.set.outputs.users }}
      chat: ${{ steps.set.outputs.chat }}
      notifications: ${{ steps.set.outputs.notifications }}
      ai: ${{ steps.set.outputs.ai }}
      frontend: ${{ steps.set.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/deploy.yml'
            events:
              - 'backend/services/events/**'
            users:
              - 'backend/services/users/**'
            chat:
              - 'backend/services/chat/**'
            notifications:
              - 'backend/services/notifications/**'
            ai:
              - 'backend/services/ai/**'
            frontend:
              - 'frontend/**'

      # If triggered manually with deploy_all=true, force everything to true
      - name: Resolve outputs
        id: set
        run: |
          ALL="${{ github.event_name == 'workflow_dispatch' && inputs.deploy_all == true }}"
          echo "terraform=$([ "$ALL" = "true" ] && echo true || echo ${{ steps.filter.outputs.terraform }})" >> $GITHUB_OUTPUT
          echo "events=$([ "$ALL" = "true" ] && echo true || echo ${{ steps.filter.outputs.events }})" >> $GITHUB_OUTPUT
          echo "users=$([ "$ALL" = "true" ] && echo true || echo ${{ steps.filter.outputs.users }})" >> $GITHUB_OUTPUT
          echo "chat=$([ "$ALL" = "true" ] && echo true || echo ${{ steps.filter.outputs.chat }})" >> $GITHUB_OUTPUT
          echo "notifications=$([ "$ALL" = "true" ] && echo true || echo ${{ steps.filter.outputs.notifications }})" >> $GITHUB_OUTPUT
          echo "ai=$([ "$ALL" = "true" ] && echo true || echo ${{ steps.filter.outputs.ai }})" >> $GITHUB_OUTPUT
          echo "frontend=$([ "$ALL" = "true" ] && echo true || echo ${{ steps.filter.outputs.frontend }})" >> $GITHUB_OUTPUT

  # ── 1. Apply infrastructure changes ──────────────────────────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="db_password=${{ secrets.TF_DB_PASSWORD }}" \
            -var="cognito_user_pool_id=${{ secrets.COGNITO_USER_POOL_ID }}" \
            -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -var="google_client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -var="r2_access_key_id=${{ secrets.R2_ACCESS_KEY_ID }}" \
            -var="r2_secret_access_key=${{ secrets.R2_SECRET_ACCESS_KEY }}" \
            -var="openrouter_api_key=${{ secrets.OPENROUTER_API_KEY }}"

  # ── 2. Deploy events service ──────────────────────────────────────────────
  deploy-events:
    name: Deploy Events Service
    runs-on: ubuntu-latest
    needs: [changes, terraform]
    if: |
      always() &&
      needs.changes.outputs.events == 'true' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve ECR URL
        id: ecr
        run: |
          echo "url=$(aws ecr describe-repositories --repository-names ${{ env.APP_NAME }}-events --query 'repositories[0].repositoryUri' --output text)" >> $GITHUB_OUTPUT

      - name: Build, Tag, and Push Image
        run: |
          docker build --platform linux/arm64 --provenance=false \
            -t ${{ steps.ecr.outputs.url }}:latest \
            -t ${{ steps.ecr.outputs.url }}:${{ github.sha }} \
            ./backend/services/events
          docker push ${{ steps.ecr.outputs.url }}:latest
          docker push ${{ steps.ecr.outputs.url }}:${{ github.sha }}

      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-events \
            --image-uri ${{ steps.ecr.outputs.url }}:latest

      - name: Wait for Lambda Update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.APP_NAME }}-events

      - name: Run Migrations
        run: |
          aws lambda invoke \
            --function-name ${{ env.APP_NAME }}-events \
            --payload '{"action":"migrate"}' \
            --cli-binary-format raw-in-base64-out \
            --log-type Tail \
            /tmp/migrate-response.json
          cat /tmp/migrate-response.json

      - name: Update events Lambda env (SNS + Scheduler vars)
        run: |
          SNS_ARN=$(aws sns list-topics --query "Topics[?contains(TopicArn,'announcements')].TopicArn" --output text)
          SCHEDULER_ROLE=$(aws iam get-role --role-name ${{ env.APP_NAME }}-scheduler-role --query 'Role.Arn' --output text)
          NOTIF_ARN=$(aws lambda get-function --function-name ${{ env.APP_NAME }}-notifications --query 'Configuration.FunctionArn' --output text)
          aws lambda update-function-configuration \
            --function-name ${{ env.APP_NAME }}-events \
            --environment "Variables={
              DATABASE_URL=${{ secrets.DATABASE_URL }},
              ENV=production,
              COGNITO_REGION=${{ env.AWS_REGION }},
              COGNITO_USER_POOL_ID=${{ secrets.COGNITO_USER_POOL_ID }},
              R2_BUCKET=${{ secrets.R2_BUCKET }},
              R2_ENDPOINT_URL=${{ secrets.R2_ENDPOINT_URL }},
              R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }},
              R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }},
              R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }},
              ANNOUNCEMENTS_SNS_TOPIC_ARN=$SNS_ARN,
              SCHEDULER_ROLE_ARN=$SCHEDULER_ROLE,
              NOTIFICATIONS_LAMBDA_ARN=$NOTIF_ARN
            }"

  # ── 3. Deploy users service ───────────────────────────────────────────────
  deploy-users:
    name: Deploy Users Service
    runs-on: ubuntu-latest
    needs: [changes, terraform]
    if: |
      always() &&
      needs.changes.outputs.users == 'true' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve ECR URL
        id: ecr
        run: |
          echo "url=$(aws ecr describe-repositories --repository-names ${{ env.APP_NAME }}-users --query 'repositories[0].repositoryUri' --output text)" >> $GITHUB_OUTPUT

      - name: Build, Tag, and Push Image
        run: |
          docker build --platform linux/arm64 --provenance=false \
            -t ${{ steps.ecr.outputs.url }}:latest \
            -t ${{ steps.ecr.outputs.url }}:${{ github.sha }} \
            ./backend/services/users
          docker push ${{ steps.ecr.outputs.url }}:latest
          docker push ${{ steps.ecr.outputs.url }}:${{ github.sha }}

      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-users \
            --image-uri ${{ steps.ecr.outputs.url }}:latest

      - name: Wait for Lambda Update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.APP_NAME }}-users

      - name: Run Migrations
        run: |
          aws lambda invoke \
            --function-name ${{ env.APP_NAME }}-users \
            --payload '{"action":"migrate"}' \
            --cli-binary-format raw-in-base64-out \
            --log-type Tail \
            /tmp/migrate-response.json
          cat /tmp/migrate-response.json

      - name: Update users Lambda env
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ env.APP_NAME }}-users \
            --environment "Variables={
              DATABASE_URL=${{ secrets.DATABASE_URL }},
              ENV=production,
              COGNITO_REGION=${{ env.AWS_REGION }},
              COGNITO_USER_POOL_ID=${{ secrets.COGNITO_USER_POOL_ID }}
            }"

  # ── 4. Deploy chat service ────────────────────────────────────────────────
  deploy-chat:
    name: Deploy Chat Service
    runs-on: ubuntu-latest
    needs: [changes, terraform]
    if: |
      always() &&
      needs.changes.outputs.chat == 'true' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve ECR URL
        id: ecr
        run: |
          echo "url=$(aws ecr describe-repositories --repository-names ${{ env.APP_NAME }}-chat --query 'repositories[0].repositoryUri' --output text)" >> $GITHUB_OUTPUT

      - name: Build, Tag, and Push Image
        run: |
          docker build --platform linux/arm64 --provenance=false \
            -t ${{ steps.ecr.outputs.url }}:latest \
            -t ${{ steps.ecr.outputs.url }}:${{ github.sha }} \
            ./backend/services/chat
          docker push ${{ steps.ecr.outputs.url }}:latest
          docker push ${{ steps.ecr.outputs.url }}:${{ github.sha }}

      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-chat \
            --image-uri ${{ steps.ecr.outputs.url }}:latest

      - name: Wait for Lambda Update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.APP_NAME }}-chat

  # ── 5. Deploy notifications service ──────────────────────────────────────
  deploy-notifications:
    name: Deploy Notifications Service
    runs-on: ubuntu-latest
    needs: [changes, terraform]
    if: |
      always() &&
      needs.changes.outputs.notifications == 'true' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve ECR URL
        id: ecr
        run: |
          echo "url=$(aws ecr describe-repositories --repository-names ${{ env.APP_NAME }}-notifications --query 'repositories[0].repositoryUri' --output text)" >> $GITHUB_OUTPUT

      - name: Build, Tag, and Push Image
        run: |
          docker build --platform linux/arm64 --provenance=false \
            -t ${{ steps.ecr.outputs.url }}:latest \
            -t ${{ steps.ecr.outputs.url }}:${{ github.sha }} \
            ./backend/services/notifications
          docker push ${{ steps.ecr.outputs.url }}:latest
          docker push ${{ steps.ecr.outputs.url }}:${{ github.sha }}

      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-notifications \
            --image-uri ${{ steps.ecr.outputs.url }}:latest

      - name: Wait for Lambda Update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.APP_NAME }}-notifications

      - name: Update notifications Lambda env (DATABASE_URL for announcement fan-out)
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ env.APP_NAME }}-notifications \
            --environment "Variables={ENV=production,DATABASE_URL=${{ secrets.DATABASE_URL }}}"

  # ── 6. Deploy AI service ──────────────────────────────────────────────────
  deploy-ai:
    name: Deploy AI Service
    runs-on: ubuntu-latest
    needs: [changes, terraform]
    if: |
      always() &&
      needs.changes.outputs.ai == 'true' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve ECR URL
        id: ecr
        run: |
          echo "url=$(aws ecr describe-repositories --repository-names ${{ env.APP_NAME }}-ai --query 'repositories[0].repositoryUri' --output text)" >> $GITHUB_OUTPUT

      - name: Build, Tag, and Push Image
        run: |
          docker build --platform linux/arm64 --provenance=false \
            -t ${{ steps.ecr.outputs.url }}:latest \
            -t ${{ steps.ecr.outputs.url }}:${{ github.sha }} \
            ./backend/services/ai
          docker push ${{ steps.ecr.outputs.url }}:latest
          docker push ${{ steps.ecr.outputs.url }}:${{ github.sha }}

      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-ai \
            --image-uri ${{ steps.ecr.outputs.url }}:latest

      - name: Wait for Lambda Update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.APP_NAME }}-ai

      - name: Update AI Lambda env
        run: |
          MESSAGES_TABLE=$(aws dynamodb list-tables --query "TableNames[?contains(@,'chat-messages')]" --output text)
          aws lambda update-function-configuration \
            --function-name ${{ env.APP_NAME }}-ai \
            --environment "Variables={
              DATABASE_URL=${{ secrets.DATABASE_URL }},
              ENV=production,
              COGNITO_REGION=${{ env.AWS_REGION }},
              COGNITO_USER_POOL_ID=${{ secrets.COGNITO_USER_POOL_ID }},
              MESSAGES_TABLE=$MESSAGES_TABLE,
              OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }},
              OPENROUTER_MODEL=${{ secrets.OPENROUTER_MODEL }}
            }"

  # ── 7. Build & deploy frontend to Vercel ─────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      always() &&
      needs.changes.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --token=$VERCEL_TOKEN
