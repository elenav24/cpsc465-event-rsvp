name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/services/**'
      - 'frontend/**'
      - 'terraform/**'
      - '.github/workflows/deploy.yml'

env:
  AWS_REGION: us-east-1
  APP_NAME: event-rsvp

jobs:
  # ── 0. Detect which paths changed ────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      events: ${{ steps.filter.outputs.events }}
      users: ${{ steps.filter.outputs.users }}
      chat: ${{ steps.filter.outputs.chat }}
      notifications: ${{ steps.filter.outputs.notifications }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/deploy.yml'
            events:
              - 'backend/services/events/**'
            users:
              - 'backend/services/users/**'
            chat:
              - 'backend/services/chat/**'
            notifications:
              - 'backend/services/notifications/**'
            frontend:
              - 'frontend/**'

  # ── 1. Apply infrastructure changes ──────────────────────────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="db_password=${{ secrets.TF_DB_PASSWORD }}" \
            -var="cognito_user_pool_id=${{ secrets.COGNITO_USER_POOL_ID }}" \
            -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -var="google_client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}"

  # ── 2. Deploy events service ──────────────────────────────────────────────
  deploy-events:
    name: Deploy Events Service
    runs-on: ubuntu-latest
    needs: [changes, terraform]
    if: |
      always() &&
      needs.changes.outputs.events == 'true' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve ECR URL
        id: ecr
        run: |
          echo "url=$(aws ecr describe-repositories --repository-names ${{ env.APP_NAME }}-events --query 'repositories[0].repositoryUri' --output text)" >> $GITHUB_OUTPUT

      - name: Build, Tag, and Push Image
        run: |
          docker build --platform linux/arm64 --provenance=false \
            -t ${{ steps.ecr.outputs.url }}:latest \
            -t ${{ steps.ecr.outputs.url }}:${{ github.sha }} \
            ./backend/services/events
          docker push ${{ steps.ecr.outputs.url }}:latest
          docker push ${{ steps.ecr.outputs.url }}:${{ github.sha }}

      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-events \
            --image-uri ${{ steps.ecr.outputs.url }}:latest

      - name: Wait for Lambda Update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.APP_NAME }}-events

      - name: Run Migrations
        run: |
          aws lambda invoke \
            --function-name ${{ env.APP_NAME }}-events \
            --payload '{"action":"migrate"}' \
            --cli-binary-format raw-in-base64-out \
            --log-type Tail \
            /tmp/migrate-response.json
          cat /tmp/migrate-response.json

      - name: Update events Lambda env (SNS + Scheduler vars)
        run: |
          SNS_ARN=$(aws sns list-topics --query "Topics[?contains(TopicArn,'announcements')].TopicArn" --output text)
          SCHEDULER_ROLE=$(aws iam get-role --role-name ${{ env.APP_NAME }}-scheduler-role --query 'Role.Arn' --output text)
          NOTIF_ARN=$(aws lambda get-function --function-name ${{ env.APP_NAME }}-notifications --query 'Configuration.FunctionArn' --output text)
          aws lambda update-function-configuration \
            --function-name ${{ env.APP_NAME }}-events \
            --environment "Variables={
              DATABASE_URL=${{ secrets.DATABASE_URL }},
              ENV=production,
              COGNITO_REGION=${{ env.AWS_REGION }},
              COGNITO_USER_POOL_ID=${{ secrets.COGNITO_USER_POOL_ID }},
              S3_BUCKET=${{ env.APP_NAME }}-flyers,
              S3_REGION=${{ env.AWS_REGION }},
              AWS_REGION=${{ env.AWS_REGION }},
              ANNOUNCEMENTS_SNS_TOPIC_ARN=$SNS_ARN,
              SCHEDULER_ROLE_ARN=$SCHEDULER_ROLE,
              NOTIFICATIONS_LAMBDA_ARN=$NOTIF_ARN
            }"

  # ── 3. Deploy users service ───────────────────────────────────────────────
  deploy-users:
    name: Deploy Users Service
    runs-on: ubuntu-latest
    needs: [changes, terraform]
    if: |
      always() &&
      needs.changes.outputs.users == 'true' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve ECR URL
        id: ecr
        run: |
          echo "url=$(aws ecr describe-repositories --repository-names ${{ env.APP_NAME }}-users --query 'repositories[0].repositoryUri' --output text)" >> $GITHUB_OUTPUT

      - name: Build, Tag, and Push Image
        run: |
          docker build --platform linux/arm64 --provenance=false \
            -t ${{ steps.ecr.outputs.url }}:latest \
            -t ${{ steps.ecr.outputs.url }}:${{ github.sha }} \
            ./backend/services/users
          docker push ${{ steps.ecr.outputs.url }}:latest
          docker push ${{ steps.ecr.outputs.url }}:${{ github.sha }}

      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-users \
            --image-uri ${{ steps.ecr.outputs.url }}:latest

      - name: Wait for Lambda Update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.APP_NAME }}-users

      - name: Run Migrations
        run: |
          aws lambda invoke \
            --function-name ${{ env.APP_NAME }}-users \
            --payload '{"action":"migrate"}' \
            --cli-binary-format raw-in-base64-out \
            --log-type Tail \
            /tmp/migrate-response.json
          cat /tmp/migrate-response.json

  # ── 4. Deploy chat service ────────────────────────────────────────────────
  deploy-chat:
    name: Deploy Chat Service
    runs-on: ubuntu-latest
    needs: [changes, terraform]
    if: |
      always() &&
      needs.changes.outputs.chat == 'true' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve ECR URL
        id: ecr
        run: |
          echo "url=$(aws ecr describe-repositories --repository-names ${{ env.APP_NAME }}-chat --query 'repositories[0].repositoryUri' --output text)" >> $GITHUB_OUTPUT

      - name: Build, Tag, and Push Image
        run: |
          docker build --platform linux/arm64 --provenance=false \
            -t ${{ steps.ecr.outputs.url }}:latest \
            -t ${{ steps.ecr.outputs.url }}:${{ github.sha }} \
            ./backend/services/chat
          docker push ${{ steps.ecr.outputs.url }}:latest
          docker push ${{ steps.ecr.outputs.url }}:${{ github.sha }}

      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-chat \
            --image-uri ${{ steps.ecr.outputs.url }}:latest

      - name: Wait for Lambda Update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.APP_NAME }}-chat

  # ── 5. Deploy notifications service ──────────────────────────────────────
  deploy-notifications:
    name: Deploy Notifications Service
    runs-on: ubuntu-latest
    needs: [changes, terraform]
    if: |
      always() &&
      needs.changes.outputs.notifications == 'true' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve ECR URL
        id: ecr
        run: |
          echo "url=$(aws ecr describe-repositories --repository-names ${{ env.APP_NAME }}-notifications --query 'repositories[0].repositoryUri' --output text)" >> $GITHUB_OUTPUT

      - name: Build, Tag, and Push Image
        run: |
          docker build --platform linux/arm64 --provenance=false \
            -t ${{ steps.ecr.outputs.url }}:latest \
            -t ${{ steps.ecr.outputs.url }}:${{ github.sha }} \
            ./backend/services/notifications
          docker push ${{ steps.ecr.outputs.url }}:latest
          docker push ${{ steps.ecr.outputs.url }}:${{ github.sha }}

      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-notifications \
            --image-uri ${{ steps.ecr.outputs.url }}:latest

      - name: Wait for Lambda Update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.APP_NAME }}-notifications

      - name: Update notifications Lambda env (DATABASE_URL for announcement fan-out)
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ env.APP_NAME }}-notifications \
            --environment "Variables={ENV=production,DATABASE_URL=${{ secrets.DATABASE_URL }}}"

  # ── 6. Build & deploy frontend to S3 ─────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [changes, terraform]
    if: |
      always() &&
      needs.changes.outputs.frontend == 'true' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
        run: |
          npm ci
          npm run build

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist s3://${{ env.APP_NAME }}-frontend \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ env.APP_NAME }}-frontend/index.html \
            --cache-control "no-cache,no-store,must-revalidate"
