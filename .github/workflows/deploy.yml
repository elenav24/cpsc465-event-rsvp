name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'terraform/**'
      - '.github/workflows/deploy.yml'

env:
  AWS_REGION: us-east-1
  APP_NAME: event-rsvp

jobs:
  # ── 1. Apply infrastructure changes ──────────────────────────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    outputs:
      ecr_url: ${{ steps.tf_outputs.outputs.ecr_url }}
      lambda_name: ${{ steps.tf_outputs.outputs.lambda_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="db_password=${{ secrets.TF_DB_PASSWORD }}" \
            -var="cognito_user_pool_id=${{ secrets.COGNITO_USER_POOL_ID }}"

      - name: Capture Outputs
        id: tf_outputs
        run: |
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "lambda_name=$(terraform output -raw lambda_function_name)" >> $GITHUB_OUTPUT

  # ── 2. Build & push Docker image, update Lambda ───────────────────────────
  deploy:
    name: Build & Deploy Lambda
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, Tag, and Push Image to ECR
        run: |
          docker build --platform linux/arm64 --provenance=false \
            -t ${{ needs.terraform.outputs.ecr_url }}:latest \
            -t ${{ needs.terraform.outputs.ecr_url }}:${{ github.sha }} \
            ./backend
          docker push ${{ needs.terraform.outputs.ecr_url }}:latest
          docker push ${{ needs.terraform.outputs.ecr_url }}:${{ github.sha }}

      - name: Update Lambda Function Code
        run: |
          aws lambda update-function-code \
            --function-name ${{ needs.terraform.outputs.lambda_name }} \
            --image-uri ${{ needs.terraform.outputs.ecr_url }}:latest

      - name: Wait for Lambda Update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ needs.terraform.outputs.lambda_name }}

      - name: Run Migrations
        run: |
          aws lambda invoke \
            --function-name ${{ needs.terraform.outputs.lambda_name }} \
            --payload '{"action":"migrate"}' \
            --cli-binary-format raw-in-base64-out \
            --log-type Tail \
            /tmp/migrate-response.json
          cat /tmp/migrate-response.json
