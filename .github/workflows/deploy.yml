name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'terraform/**'
      - '.github/workflows/deploy.yml'

env:
  AWS_REGION: us-east-1
  APP_NAME: event-rsvp

jobs:
  # ── 0. Detect which paths changed ────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/deploy.yml'
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ── 1. Apply infrastructure changes ──────────────────────────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    defaults:
      run:
        working-directory: terraform
    outputs:
      ecr_url: ${{ steps.tf_outputs.outputs.ecr_url }}
      lambda_name: ${{ steps.tf_outputs.outputs.lambda_name }}
      frontend_bucket: ${{ steps.tf_outputs.outputs.frontend_bucket }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="db_password=${{ secrets.TF_DB_PASSWORD }}" \
            -var="cognito_user_pool_id=${{ secrets.COGNITO_USER_POOL_ID }}"

      - name: Capture Outputs
        id: tf_outputs
        run: |
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "lambda_name=$(terraform output -raw lambda_function_name)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket_name)" >> $GITHUB_OUTPUT

  # ── 2. Build & push Docker image, update Lambda ───────────────────────────
  deploy-backend:
    name: Build & Deploy Lambda
    runs-on: ubuntu-latest
    needs: [changes, terraform]
    if: |
      always() &&
      needs.changes.outputs.backend == 'true' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fetch Terraform Outputs
        id: tf_outputs
        run: |
          echo "ecr_url=$(aws ecr describe-repositories --repository-names ${{ env.APP_NAME }} --query 'repositories[0].repositoryUri' --output text)" >> $GITHUB_OUTPUT
          echo "lambda_name=${{ env.APP_NAME }}" >> $GITHUB_OUTPUT

      - name: Build, Tag, and Push Image to ECR
        run: |
          docker build --platform linux/arm64 --provenance=false \
            -t ${{ steps.tf_outputs.outputs.ecr_url }}:latest \
            -t ${{ steps.tf_outputs.outputs.ecr_url }}:${{ github.sha }} \
            ./backend
          docker push ${{ steps.tf_outputs.outputs.ecr_url }}:latest
          docker push ${{ steps.tf_outputs.outputs.ecr_url }}:${{ github.sha }}

      - name: Update Lambda Function Code
        run: |
          aws lambda update-function-code \
            --function-name ${{ steps.tf_outputs.outputs.lambda_name }} \
            --image-uri ${{ steps.tf_outputs.outputs.ecr_url }}:latest

      - name: Wait for Lambda Update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ steps.tf_outputs.outputs.lambda_name }}

      - name: Run Migrations
        run: |
          aws lambda invoke \
            --function-name ${{ steps.tf_outputs.outputs.lambda_name }} \
            --payload '{"action":"migrate"}' \
            --cli-binary-format raw-in-base64-out \
            --log-type Tail \
            /tmp/migrate-response.json
          cat /tmp/migrate-response.json

  # ── 3. Build & deploy frontend to S3 ─────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [changes, terraform]
    if: |
      always() &&
      needs.changes.outputs.frontend == 'true' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch Frontend Bucket Name
        id: tf_outputs
        run: |
          echo "frontend_bucket=${{ env.APP_NAME }}-frontend" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist s3://${{ steps.tf_outputs.outputs.frontend_bucket }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ steps.tf_outputs.outputs.frontend_bucket }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"
